name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    env:
      # Expose a simple boolean at the env level so `if:` expressions can
      # reference it. We can't use `secrets.*` directly in `if:`.
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary requires both targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      # Export Apple signing env vars ONLY if the certificate secret is
      # present. An empty APPLE_CERTIFICATE tells tauri-action to try
      # signing with an empty cert, which breaks the macOS build.
      - name: Configure Apple signing env
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Embedded into the binary at compile time (via option_env!).
          GHTASKS_CLIENT_ID: ${{ secrets.GHTASKS_CLIENT_ID }}
          # Apple signing/notarization vars (APPLE_CERTIFICATE etc.) are
          # injected into the environment by the preceding step when the
          # certificate secret is present; otherwise the macOS build is
          # unsigned.
        with:
          # Create a draft release on tag push; we publish manually after we
          # verify the artifacts look right.
          tagName: ${{ github.ref_name }}
          releaseName: "GH Tasks ${{ github.ref_name }}"
          releaseBody: |
            Automated build for ${{ github.ref_name }}.

            - macOS: `.dmg` (universal, Apple Silicon + Intel)
            - Windows: `.msi`
            - Linux: `.AppImage` and `.deb`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
