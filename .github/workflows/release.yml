name: Release

on:
  push:
    tags:
      # Stable: v1.2.3   Beta: v1.2.3-beta.1 (any pre-release suffix works).
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Fail the whole release fast if there are no per-version release notes.
  # Avoids burning ~30 min of macOS/Windows/Linux build time only to
  # discover we forgot the markdown file for the tag. Also classifies the tag
  # as beta (pre-release) vs stable and exposes it to later jobs.
  preflight:
    runs-on: ubuntu-latest
    outputs:
      is_beta: ${{ steps.classify.outputs.is_beta }}
    steps:
      - uses: actions/checkout@v4
      - name: Require release_notes/<tag>.md
        shell: bash
        run: |
          NOTES_FILE="release_notes/${{ github.ref_name }}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error title=Missing release notes::Expected $NOTES_FILE for tag ${{ github.ref_name }}. Create the file, commit, retag, and push."
            exit 1
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "::error title=Empty release notes::$NOTES_FILE exists but is empty."
            exit 1
          fi
          echo "Release notes present: $NOTES_FILE"
      - name: Classify channel (beta vs stable)
        id: classify
        shell: bash
        run: |
          # A hyphen in the tag (e.g. v0.6.0-beta.1) marks a pre-release/beta.
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
            echo "Channel: BETA (pre-release)"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
            echo "Channel: STABLE"
          fi

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    env:
      # Expose a simple boolean at the env level so `if:` expressions can
      # reference it. We can't use `secrets.*` directly in `if:`.
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary requires both targets.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install npm deps
        run: npm ci

      # Preflight guarantees release_notes/<tag>.md exists; just load it.
      - name: Load release notes
        shell: bash
        run: |
          NOTES_FILE="release_notes/${{ github.ref_name }}.md"
          {
            echo "RELEASE_BODY<<__EOF__"
            cat "$NOTES_FILE"
            echo "__EOF__"
          } >> "$GITHUB_ENV"

      # Export Apple signing env vars ONLY if the certificate secret is
      # present. An empty APPLE_CERTIFICATE tells tauri-action to try
      # signing with an empty cert, which breaks the macOS build.
      - name: Configure Apple signing env
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_CERT == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE=${{ secrets.APPLE_CERTIFICATE }}"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"

      - name: Build and release with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Embedded into the binary at compile time (via option_env!).
          GHTASKS_CLIENT_ID: ${{ secrets.GHTASKS_CLIENT_ID }}
          # Tauri updater signing. The private key signs the updater
          # bundles so `tauri-plugin-updater` can verify them against
          # the public key baked into tauri.conf.json before installing.
          # Without these, `createUpdaterArtifacts: true` will fail the build.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing/notarization vars (APPLE_CERTIFICATE etc.) are
          # injected into the environment by the preceding step when the
          # certificate secret is present; otherwise the macOS build is
          # unsigned.
        with:
          # Both channels auto-publish (no manual draft step). Beta tags publish
          # as GitHub *pre-releases*, which `/releases/latest` excludes — so
          # stable users' auto-updater never sees them.
          tagName: ${{ github.ref_name }}
          releaseName: "GitHub Tasks ${{ github.ref_name }}"
          releaseBody: ${{ env.RELEASE_BODY }}
          releaseDraft: false
          prerelease: ${{ needs.preflight.outputs.is_beta == 'true' }}
          args: ${{ matrix.args }}

  # Point the beta channel's endpoint at this build's manifest.
  #
  # The app's beta updater reads:
  #   github.com/cgaspard/ghtasks/releases/download/beta/latest-beta.json
  # `beta` is a permanent pre-release whose only job is to host that manifest.
  # A release's per-platform builds attach `latest.json` + bundle assets to the
  # vX.Y.Z(-beta.N) release; we copy that manifest here as `latest-beta.json`.
  # Its bundle URLs already point at the versioned release's real assets.
  #
  # Runs for BOTH channels on purpose:
  #   - beta tag   -> beta users get the new beta.
  #   - stable tag -> beta users CONVERGE onto the stable build (semver:
  #     0.6.0 > 0.6.0-beta.2), so no one is stranded on an old beta after a
  #     promotion. Stable users are unaffected (they read /releases/latest).
  refresh-beta-channel:
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - name: Copy latest.json onto the permanent `beta` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Pull the manifest the build just attached to this version's release.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern "latest.json" --output latest-beta.json
          echo "Fetched manifest for $TAG:"
          grep -m1 '"version"' latest-beta.json || true

          # Ensure the permanent `beta` release exists (pre-release, so it never
          # becomes /releases/latest). Create it once; reuse it thereafter.
          if ! gh release view beta --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create beta --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "Beta channel" \
              --notes "Rolling pointer to the newest beta (or just-promoted stable) build. Enable *Receive beta updates* in GitHub Tasks → Settings to track this channel. Do not download from here directly."
          fi

          # Overwrite the manifest (--clobber replaces the existing asset).
          gh release upload beta latest-beta.json --repo "$GITHUB_REPOSITORY" --clobber
          echo "Beta channel now points at $TAG."
